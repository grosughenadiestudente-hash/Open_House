<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Simulazione Test Chirurgico</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>body{margin:0;font-family:Arial,Helvetica,sans-serif}#overlay{position:fixed;left:10px;top:10px;z-index:10;background:rgba(255,255,255,0.9);padding:8px;border-radius:6px}</style>
  </head>
  <body>
    <div id="overlay">
      <h4>Simulazione: test chirurgico</h4>
      <p>Questa è una demo WebXR/A-Frame. Usa il pulsante "Enter VR" (se supportato) per provare.</p>
    </div>

    <a-scene embedded background="color: #ECECEC">
      <a-box position="0 1 -3" rotation="0 45 0" color="#4CC3D9"></a-box>
      <a-sphere position="1.5 1.25 -4" radius="0.5" color="#EF2D5E"></a-sphere>
      <a-cylinder position="-1 0.75 -2" radius="0.3" height="1.5" color="#FFC65D"></a-cylinder>
      <a-plane rotation="-90 0 0" width="10" height="10" color="#7BC8A4"></a-plane>
      <a-sky color="#ECECEC"></a-sky>
    </a-scene>
  </body>
</html>
